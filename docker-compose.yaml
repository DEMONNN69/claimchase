services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimchase"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "8000"
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  proxy:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: proxy
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    expose:
      - "3001"
    depends_on:
      - backend

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - proxy

volumes:
  postgres_data:
  certbot_webroot:
  static_files: