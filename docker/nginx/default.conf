# Redirect all HTTP to HTTPS, except ACME challenge
server {
    listen 80;
    server_name amicusclaims.ai www.amicusclaims.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name amicusclaims.ai www.amicusclaims.ai;

    ssl_certificate     /etc/letsencrypt/live/amicusclaims.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amicusclaims.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Block env file probes
    location ~* /\.env {
        return 404;
    }

    # --- Static HTML pages served directly (MUST be before SPA catch-all) ---
    # Google OAuth brand verification requires these to be accessible as raw HTML,
    # not intercepted by the SPA try_files fallback.
    location = /privacy-policy.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    location = /terms.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    location = /googlef256bdad7e450c20.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    # Serve React SPA (catch-all — must come AFTER specific locations above)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy document downloads to the Node proxy server
    location /api/proxy-documents {
        proxy_pass http://proxy:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    # Proxy all other /api/ calls to Django
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /admin/ to Django
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Gmail Pub/Sub webhook to Django
    location /webhooks/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve Django static files
    location /static/ {
        proxy_pass http://backend:8000;
    }
}