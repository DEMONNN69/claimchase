services:
  - type: web
    name: claimchase-backend
    env: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: cd backend && gunicorn claimchase.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: claimchase.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: claimchase-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-domain.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-frontend-domain.com,https://claimchase-backend.onrender.com
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DEBUG
        value: False

databases:
  - name: claimchase-db
    databaseName: claimchase
    user: claimchase
    region: oregon
